# USD per 1,000,000 tokens. Captured 2026-07-08 from the Claude API pricing table
# (https://platform.claude.com/docs/en/about-claude/pricing).
# Cache pricing is a multiplier on the model's base *input* rate, not a separate
# per-model lookup:
#   cache_write_5m = input_price * 1.25
#   cache_write_1h = input_price * 2.0
#   cache_read     = input_price * 0.1
#
# `models` holds each model's *standard* (post-introductory) rate. Time-limited
# introductory rates live in `introductory_pricing` below and are applied per
# turn based on the turn's own timestamp — not today's date — so historical
# turns keep the rate that was actually in effect when they ran, and turns
# dated on/after `valid_until` automatically fall back to the standard rate
# here with no code or config change needed.
models:
  claude-fable-5:    { input: 10.00, output: 50.00 }
  claude-mythos-5:   { input: 10.00, output: 50.00 }
  claude-opus-4-8:   { input: 5.00,  output: 25.00 }
  claude-opus-4-7:   { input: 5.00,  output: 25.00 }
  claude-opus-4-6:   { input: 5.00,  output: 25.00 }
  claude-opus-4-5:   { input: 5.00,  output: 25.00 }
  claude-sonnet-5:   { input: 3.00,  output: 15.00 }
  claude-sonnet-4-6: { input: 3.00,  output: 15.00 }
  claude-sonnet-4-5: { input: 3.00,  output: 15.00 }
  claude-haiku-4-5:  { input: 1.00,  output: 5.00 }

# Introductory pricing in effect for turns dated *before* valid_until (UTC,
# exclusive). Per the pricing page: "Claude Sonnet 5 through August 31, 2026"
# at $2/$10, standard $3/$15 resumes 2026-09-01. Remove this entry (or let it
# age out — it's already inert after valid_until) once no longer needed.
introductory_pricing:
  claude-sonnet-5:
    valid_until: "2026-09-01"
    input: 2.00
    output: 10.00

cache_multipliers:
  write_5m: 1.25
  write_1h: 2.0
  read: 0.1

unknown_model_fallback: claude-sonnet-5
